# SeaTunnel 配置文件 — Phase 1 底座
# 数据源连接器列表 (100+ 连接器，按需加载)
# 完整配置参考: https://seatunnel.apache.org/docs/

seatunnel:
  engine:
    # 检查点存储
    checkpoint:
      interval: 60000
      timeout: 60000
      max-concurrent: 1
      tolerable-failure: 2
      storage:
        type: localfile
        max-retained: 3
        plugin-config:
          namespace: /tmp/seatunnel/checkpoint/

    # 作业失败重试
    job-retry:
      max-retry: 3
      retry-interval: 30000

    # 历史作业清理
    history-job-expire-minutes: 1440  # 24小时
